services:
  db:
    image: pgvector/pgvector:0.8.2-pg17
    container_name: ai-sales-coach-db
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ai_sales_coach
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: node:18-slim
    container_name: ai-sales-coach-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - DATABASE_URL=${DATABASE_URL_DEV}
      - QWEN_API_KEY=${QWEN_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - QWEN_MODEL=${QWEN_MODEL}
      - QWEN_BASE_URL=${QWEN_BASE_URL}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL}
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_URL=${AUTH_URL_DEV}
      - AUTH_TRUST_HOST=true
      - NEXTAUTH_URL=${NEXTAUTH_URL_DEV}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NODE_ENV=development
    command: >
      sh -c "apt-get update -y && apt-get install -y openssl &&
             npm install -g pnpm@9 &&
             pnpm install &&
             npx prisma generate &&
             pnpm dev"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  node_modules:
